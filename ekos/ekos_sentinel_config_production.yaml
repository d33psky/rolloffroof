# Production configuration for ekos_sentinel.py - Real observatory hardware
description: "Production configuration for real observatory hardware"

indi:
  weather:
    property: "Weather Meta.WEATHER_STATUS.STATION_STATUS"
    ok_setting: "Ok"
    station_indexes: [1]

  mount:
    park_property: "10micron.TELESCOPE_PARK.PARK"
    park_setting: "On"
    unpark_property: "10micron.TELESCOPE_PARK.UNPARK"
    unpark_setting: "On"
    track_state_property: "10micron.TELESCOPE_TRACK_STATE.TRACK_ON"
    track_state_setting: "Off"
    coord_dec_property: "10micron.EQUATORIAL_EOD_COORD.DEC"
    coord_dec_park_position: "39"
    coord_dec_max_offset: "1"
    # Optional 10Micron LX200 enhancement (INDI-bypass). Presence of lx200.host
    # enables Gstat==5 as the definitive confirm at the close-roof precondition
    # and as a fallback when INDI is unreachable. Generic/public users omit this
    # whole block and run pure INDI.
    lx200:
      host: "192.168.100.73"
      port: 3490
      gstat_parked: "5#"

  dome:
    park_property: "Dome Scripting Gateway.DOME_PARK.PARK"
    park_setting: "On"

  camera:
    device: "ZWO CCD ASI2600MM Pro"
    cooler_property: "ZWO CCD ASI2600MM Pro.CCD_COOLER.COOLER_OFF"
    cooler_setting: "On"
    cooler_power_property: "ZWO CCD ASI2600MM Pro.CCD_COOLER_POWER.CCD_COOLER_VALUE"
    temperature_property: "ZWO CCD ASI2600MM Pro.CCD_TEMPERATURE.CCD_TEMPERATURE_VALUE"

  cap:
    property: null  # No dust cap in production setup
    setting: null

timeouts:
  indi_command: 5
  mount_park: 60
  roof_close: 60
  cap_close: 60

safety:
  unsafe_count_max: 3
  main_loop_sleep_seconds: 60
  max_retries: 5
  retry_delay: 5

# Tunables for the observatory-open / observatory-close sequence scripts.
sequence:
  cool_target: -10     # camera setpoint at startup (deg C)
  cool_slope: 3        # deg C / min
  warm_target: 40      # camera setpoint at shutdown (above ambient -> TEC to 0)
  warm_slope: 5
  warm_threshold: 5    # consider the sensor "warm enough" to cut the TEC at this temp
  warm_timeout: 600    # but don't wait longer than this before cooler-off

